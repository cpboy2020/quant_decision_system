global:
  resolve_timeout: 5m
  smtp_from: 'alerts@quant-company.com'
  smtp_smarthost: 'smtp.exmail.qq.com:465'
  smtp_auth_username: 'alerts@quant-company.com'
  smtp_auth_password: 'your_smtp_password'
  smtp_require_tls: true

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'default-email'
  group_by: ['alertname', 'severity', 'namespace']
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - match:
        severity: critical
      receiver: 'wechat-critical'
      continue: true
      repeat_interval: 30m
    - match:
        severity: warning
      receiver: 'dingtalk-warning'
      repeat_interval: 1h
    - match_re:
        alertname: 'Quant.*'
      receiver: 'quant-team-email'
      group_wait: 10s

receivers:
  - name: 'default-email'
    email_configs:
      - to: 'ops@quant-company.com'
        send_resolved: true
        headers:
          Subject: '[Quant-Alert] {{ .GroupLabels.alertname }} ({{ .CommonLabels.severity }})'

  - name: 'quant-team-email'
    email_configs:
      - to: 'quant-team@quant-company.com'
        html: '{{ template "email.default.html" . }}'
        send_resolved: true

  # 企微 Webhook (需配合 prometheus-webhook-wechat 或自定义网关)
  - name: 'wechat-critical'
    webhook_configs:
      - url: 'http://alertmanager-webhook-wechat:8060/wechat'
        send_resolved: true
        max_alerts: 3

  # 钉钉 Webhook (需配合 prometheus-webhook-dingtalk)
  - name: 'dingtalk-warning'
    webhook_configs:
      - url: 'http://alertmanager-webhook-dingtalk:8060/dingtalk/webhook1/send'
        send_resolved: true
        max_alerts: 5

inhibit_rules:
  - source_match: { severity: 'critical' }
    target_match: { severity: 'warning' }
    equal: ['alertname', 'namespace']
