name: Quant System CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # 每日 02:00 UTC 运行完整性检查
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  # ================= 质量门禁 & 测试 =================
  quality-test:
    name: Quality & Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.11', '3.12']
      fail-fast: false
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      
      - name: Setup Python & Cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: 'requirements/*.txt'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip-compile requirements/base.txt --generate-hashes -o requirements-prod.txt
      
      - name: Lint (Ruff)
        run: ruff check . --output-format=github --exit-zero
      
      - name: Format Check (Ruff)
        run: ruff format . --check
      
      - name: Type Check (MyPy)
        run: mypy . --ignore-missing-imports --show-error-codes
      
      - name: Security Scan (Bandit)
        run: bandit -r . -ll --exclude .venv,tests -f json -o bandit-report.json || true
      
      - name: Unit Tests + Coverage
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing \
            -m "not slow and not e2e" --junitxml=test-results.xml
      
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python }}
          path: |
            test-results.xml
            bandit-report.json
            htmlcov/
          retention-days: 7

  # ================= 回测验证（仅 main 分支） =================
  backtest-validation:
    name: Backtest Validation
    needs: quality-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -r requirements/base.txt
      - name: Run Monte Carlo Significance Test
        run: |
          python scripts/backtest_runner.py --mode mc --days 500
          # 验证显著性 (p < 0.05)
          python -c "import json; r=json.load(open('results/backtest_report.json')); assert r['monte_carlo']['significant'], '策略不显著'"
      - name: Archive Backtest Report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: results/backtest_report.json
          retention-days: 30

  # ================= 构建与推送镜像 =================
  build-push:
    name: Build & Push Docker Image
    needs: [quality-test, backtest-validation]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
      
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
