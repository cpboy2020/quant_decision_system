version: "3.9"
services:
  # 量化主应用 (挂载代码 + 调试端口)
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: quant-app-dev
    restart: unless-stopped
    ports:
      - "8000:8000"   # FastAPI/HTTP
      - "5678:5678"   # debugpy
      - "9090:9090"   # Prometheus Metrics
    volumes:
      - ../..:/app:cached
      - /app/__pycache__
      - ../../config:/app/config:ro
    environment:
      ENV: development
      MODE: paper
      DEBUGPY_ENABLE: "1"
      PROMETHEUS_URL: http://prometheus:9090
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: DEBUG
    depends_on:
      prometheus: { condition: service_started }
      elasticsearch: { condition: service_healthy }
    command: >
      sh -c "pip install -q -r requirements/dev.txt &&
             python -m debugpy --listen 0.0.0.0:5678 --wait-for-client main.py"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Prometheus 指标采集
  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    ports: ["9091:9090"]
    volumes:
      - ../../config/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-admin-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "yesoreyeram-boomtable-panel,grafana-piechart-panel"
    volumes:
      - grafana_/var/lib/grafana
      - ../../infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus]

  # Elasticsearch 审计日志存储 (单节点开发模式)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: quant-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200", "9300:9300"]
    volumes: [es_/usr/share/elasticsearch/data]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    deploy: { resources: { limits: { memory: 1.5G } } }

  # Kafka 消息队列 (KRaft 模式，无 Zookeeper)
  kafka:
    image: bitnami/kafka:3.7.0
    container_name: quant-kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_KRAFT_CLUSTER_ID: "quant-cluster-dev-01"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes: [kafka_/bitnami/kafka]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO 对象存储 (替代 S3 用于 Savepoint/模型归档)
  minio:
    image: minio/minio:latest
    container_name: quant-minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes: [minio_/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default: { name: quant-dev-net, driver: bridge }

volumes:
  prom_ { driver: local }
  grafana_ { driver: local }
  es_data: { driver: local }
  kafka_ { driver: local }
  minio_ { driver: local }
