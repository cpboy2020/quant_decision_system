apiVersion: v1
kind: Secret
meta
  name: river-model-keys
  namespace: quant-prod
type: Opaque
data:
  encryption-key: $(openssl rand -hex 32 | base64)  # 替换为实际 KMS 派生密钥
  etcd-ca: $(base64 -w0 /etc/pki/etcd/ca.crt)
  etcd-key: $(base64 -w0 /etc/pki/etcd/client.key)
  etcd-cert: $(base64 -w0 /etc/pki/etcd/client.crt)
