apiVersion: apps/v1
kind: Deployment
meta
  name: audit-chain-gateway
  namespace: quant-prod
spec:
  replicas: 2
  selector: { matchLabels: { app: audit-gateway } }
  template:
    meta
      labels: { app: audit-gateway }
    spec:
      containers:
        - name: gateway
          image: registry.quant.io/audit-gateway:v1.0
          command: ["python", "main.py"]  # 集成上述中间件的 FastAPI 入口
          env:
            - name: AUDIT_ECDSA_PRIVKEY {valueFrom: {secretKeyRef: {name: audit-keys, key: ecdsa-hex}}}
            - name: CHAIN_RPC_URL {value: "http://consortium-chain-rpc.quant.svc:8545"}
            - name: AUDIT_CONTRACT_ADDR {value: "0xAuDi7C0n7R4c7..."}
          ports: [{containerPort: 8443}]
