apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: quant-prod
resources:
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - network-policy.yaml
commonLabels: { env: production, app: quant-engine }
images:
  - name: quant-engine
    newName: ghcr.io/your-org/quant_decision_system
    newTag: latest  # ArgoCD Image Updater 可自动追 latest 或 git tag
