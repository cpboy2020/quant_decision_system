apiVersion: apps/v1
kind: Deployment
meta
  name: quant-engine
spec:
  replicas: 3
  selector: { matchLabels: { app: quant-engine } }
  strategy: { rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }, type: RollingUpdate }
  template:
    meta
      labels: { app: quant-engine }
    spec:
      serviceAccountName: quant-prod-sa
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: quant-engine:latest
          ports: [{containerPort: 8000, name: http}, {containerPort: 9090, name: metrics}]
          env:
            - name: ENV
              value: "production"
            - name: MODE
              value: "live"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits: { cpu: "2", memory: "4Gi" }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: config
          configMap: { name: quant-config }
        - name: logs
          emptyDir: { sizeLimit: 2Gi }
