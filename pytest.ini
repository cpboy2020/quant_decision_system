[pytest]
# 测试路径与发现规则
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 执行选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=80

# 标记定义（用于选择性运行测试）
markers =
    unit: 单元测试（快速/无外部依赖）
    integration: 集成测试（需数据库/网关）
    slow: 耗时测试（>1 秒，CI 中可选跳过）
    e2e: 端到端测试（全流程验证）

# 日志与输出
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s:%(lineno)d - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 并行执行（需 pip install pytest-xdist）
# addopts = -n auto

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
