repos:
  # 格式化与规范检查 (极快，推荐每次提交)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix, --select=E,F,W,I,N,UP,B,SIM]

  # 静态类型检查
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --show-error-codes, --warn-unused-ignores]
        additional_dependencies: [pydantic>=2.0, types-requests, types-PyYAML]
        pass_filenames: false

  # 快速测试门禁 (仅运行变更文件相关测试，防阻塞)
  - repo: local
    hooks:
      - id: pytest-quick
        name: 🧪 Quick Test & Coverage
        entry: bash -c 'pytest tests/ -xvs -q --cov-fail-under=80 --cov=. --tb=short --ignore-glob="*e2e*"'
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
        verbose: true

  # 密钥泄露防护
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

# 性能优化：跳过大文件与生成文件
exclude: '^(\.git/|\.venv/|__pycache__/|htmlcov/|.*\.log|.*\.json)$'
