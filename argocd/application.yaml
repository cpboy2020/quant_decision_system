apiVersion: argoproj.io/v1alpha1
kind: Application
meta
  name: quant-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/quant_decision_system.git
    targetRevision: main
    path: infra/k8s/production
  destination:
    server: https://kubernetes.default.svc
    namespace: quant-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff: { duration: 5s, factor: 2, maxDuration: 3m }
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers: ["/spec/replicas"]  # 允许 HPA 自动调整副本数
